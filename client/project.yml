name: Claire
options:
  bundleIdPrefix: com.caminojc
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: JW6WJ767VT

targets:
  Claire:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Claire/Sources
        excludes:
          - "**/*.mm"
      - path: Claire/Sources/Native/ClaireAudioBridge.mm
        buildPhase: sources
        compilerFlags: ["-x", "objective-c++", "-std=c++17", "-w"]
    resources:
      - path: Claire/Resources
        includes:
          - "**/*"
    preBuildScripts:
      - name: Copy Model Files
        script: |
          # macOS: Contents/Resources/, iOS: root of .app
          if [ "${PLATFORM_NAME}" = "macosx" ]; then
            DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources"
          else
            DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          fi
          mkdir -p "${DEST}"
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.dat "${DEST}/" 2>/dev/null || true
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.smpl "${DEST}/" 2>/dev/null || true
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.zip "${DEST}/" 2>/dev/null || true
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.json "${DEST}/" 2>/dev/null || true
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.mp3 "${DEST}/" 2>/dev/null || true
          cp -f "${PROJECT_DIR}/Claire/Resources/"*.icns "${DEST}/" 2>/dev/null || true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: smpl.claire.ios
        INFOPLIST_FILE: Claire/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Claire/Resources/Claire.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # C++ bridging
        SWIFT_OBJC_BRIDGING_HEADER: Claire/Sources/Native/Claire-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        # Headers for both platforms
        HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/zipperSdk $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/ios $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/desktop $(PROJECT_DIR)/native"
        OTHER_LDFLAGS[sdk=macosx*]: "-lclaire_native -lSmplAFELib -lSmplOpusOgg -lSmplMelCodec -lSegVoxVad -lSmplCompressor -lopus -lportaudio -lc++ -framework CoreAudio -framework AudioToolbox -framework AVFoundation -framework Accelerate -framework AudioUnit -framework CoreFoundation"
        OTHER_LDFLAGS[sdk=iphoneos*]: "-ObjC -force_load $(PROJECT_DIR)/native/build/ios-arm64/libclaire_native.a -lSmplAFELib -lSmplOpusOgg -lSmplMelCodec -lSegVoxVad -lSmplCompressor -lopus -lc++ -framework AudioToolbox -framework AVFoundation -framework Accelerate"
        OTHER_LDFLAGS[sdk=iphonesimulator*]: "-lc++ -framework AVFoundation -framework AudioToolbox -framework Accelerate"
        LIBRARY_SEARCH_PATHS[sdk=macosx*]: "$(inherited) $(PROJECT_DIR)/native/build/macos-arm64"
        LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: "$(inherited) $(PROJECT_DIR)/native/build/ios-arm64"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
