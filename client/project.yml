name: Claire
options:
  bundleIdPrefix: com.caminojc
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

targets:
  Claire:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Claire/Sources
        excludes:
          - "**/*.mm"
      - path: Claire/Sources/Native/ClaireAudioBridge.mm
        buildPhase: sources
        compilerFlags: ["-x", "objective-c++", "-std=c++17", "-w"]
    resources:
      - path: Claire/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.caminojc.claire
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Claire
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Claire needs access to your microphone for voice conversations."
        CODE_SIGN_ENTITLEMENTS: Claire/Resources/Claire.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # C++ bridging
        SWIFT_OBJC_BRIDGING_HEADER: Claire/Sources/Native/Claire-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        # Native SMPL libraries (Zipper SDK + AFE + codecs + PortAudio)
        LIBRARY_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/native/build/macos-arm64"
        HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/zipperSdk $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/ios $(PROJECT_DIR)/../submodules/atria/composeApp/native/embedded/desktop $(PROJECT_DIR)/native"
        OTHER_LDFLAGS: "-lclaire_native -lSmplAFELib -lSmplOpusOgg -lSmplMelCodec -lSegVoxVad -lSmplCompressor -lopus -lportaudio -lc++ -framework CoreAudio -framework AudioToolbox -framework AVFoundation -framework Accelerate -framework AudioUnit -framework CoreFoundation"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
